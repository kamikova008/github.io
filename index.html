header {
  padding: 100px 20px;
}

h1 {
  font-size: 3em;
  animation: fadeIn 2s ease;
}

p {
  font-size: 1.2em;
  opacity: 0.8;
}

button {
  padding: 12px 25px;
  font-size: 16px;
  border: none;
  background: white;
  color: #2a5298;
  cursor: pointer;
  border-radius: 25px;
  transition: transform 0.3s, background 0.3s;
}

button:hover {
  transform: scale(1.2);
  background: #ddd;
}

.card {
  width: 250px;
  height: 150px;
  margin: 40px auto;
  perspective: 1000px;
}

.inner-card {
  width: 100%;
  height: 100%;
  position: relative;
  transition: transform 0.8s;
  transform-style: preserve-3d;
}

.card:hover .inner-card {
  transform: rotateY(180deg);
}

.front, .back {
  position: absolute;
  width: 100%;
  height: 100%;
  backface-visibility: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 10px;
}

.front {
  background: white;
  color: black;
}

.back {
  background: #ff4b2b;
  transform: rotateY(180deg);
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(30px); }
  to { opacity: 1; transform: translateY(0); }
}

/* Floating circles animation (PLUS feature) */
.circle {
  position: absolute;
  border-radius: 50%;
  background: rgba(255,255,255,0.2);
  animation: float 10s infinite ease-in-out;
}

@keyframes float {
  0% { transform: translateY(0px); }
  50% { transform: translateY(-50px); }
  100% { transform: translateY(0px); }
}

  <div class="circle" style="width:80px;height:80px;left:40%;top:90%;"></div>

  <script>
    function changeText() {
      document.querySelector("p").innerText = "You clicked the button! 🎉";
